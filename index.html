<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bob — The Friendly Neighborhood Photographer</title>
<meta name="description" content="Bob is a Minneapolis-based photographer specializing in portraits, families, sports, and live events across the Twin Cities metro." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; font-family: "Work Sans", sans-serif; background: #101520; }

  .site {
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    transition: background .3s ease, color .3s ease;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding-left: 28px; padding-right: 28px; }

  /* ---- Type ---- */
  h1, h2, h3 { font-family: "Newsreader", serif; font-weight: 500; margin: 0; }
  .eyebrow {
    font-size: 13px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; margin: 0 0 18px;
  }
  .eyebrow.accent { color: var(--accent); }
  .section-heading {
    font-size: calc(clamp(34px, 3.6vw, 50px) * var(--hscale));
    line-height: 1.12; letter-spacing: -0.01em;
    margin: 0 0 18px; max-width: 760px; text-wrap: pretty;
  }
  .section-heading.narrow { max-width: 680px; }
  .section-sub { color: var(--muted); max-width: 560px; margin: 0 0 44px; text-wrap: pretty; }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 26px; border-radius: 4px; border: 1px solid transparent;
    font: 600 15px "Work Sans", sans-serif; text-decoration: none; cursor: pointer;
    transition: filter .15s ease, background .15s ease, border-color .15s ease;
  }
  .btn-lg { padding: 16px 32px; font-size: 16px; }
  .btn-accent { background: var(--accent); color: var(--accent-ink); }
  .btn-accent:hover { filter: brightness(1.08); }
  .btn-ghost { border-color: rgba(255,255,255,.55); color: #fff; background: rgba(255,255,255,.04); }
  .btn-ghost:hover { background: rgba(255,255,255,.14); }
  .btn-ghost-dark { border-color: rgba(255,255,255,.4); color: #EFEEE9; background: transparent; }
  .btn-ghost-dark:hover { background: rgba(255,255,255,.1); }

  /* ---- Nav ---- */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; gap: 32px; height: 68px; }
  .nav-brand { display: flex; align-items: baseline; gap: 10px; text-decoration: none; color: var(--ink); margin-right: auto; }
  .brand-mark { font-family: "Newsreader", serif; font-size: 26px; font-weight: 500; }
  .brand-tag { font-size: 12px; color: var(--muted); letter-spacing: .02em; }
  .nav-links { display: flex; gap: 26px; }
  .nav-link { font-size: 14px; font-weight: 500; color: var(--muted); text-decoration: none; transition: color .15s ease; }
  .nav-link:hover { color: var(--ink); }
  .nav-cta { padding: 9px 18px; font-size: 14px; }

  /* ---- Sections ---- */
  .section { padding: var(--section-pad) 0; scroll-margin-top: 68px; }
  .section-ruled { border-top: 1px solid var(--line); }
  .section-soft { background: var(--soft); }

  /* ---- Hero ---- */
  .hero {
    position: relative; display: flex; align-items: center;
    background: #10150F; overflow: hidden;
  }
  .hero-slide {
    position: absolute; inset: 0; opacity: 0; pointer-events: none;
    transition: opacity 1.1s ease;
  }
  .hero-slide.is-active { opacity: 1; pointer-events: auto; }
  .hero-slot { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Triptych — three portrait panels side by side */
  .hero-triptych {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    background: #0A0E0B;
  }
  .hero-triptych-slot { width: 100%; height: 100%; }
  .hero-scrim {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(78deg, rgba(8,12,10,.85) 0%, rgba(8,12,10,.42) 44%, rgba(8,12,10,.05) 100%);
  }
  .hero-content {
    position: relative; z-index: 2; max-width: 480px; pointer-events: none;
    align-self: flex-end;
    padding: 110px 28px 76px; margin-left: max(28px, calc((100vw - 1160px) / 2));
  }
  .hero-content a { pointer-events: auto; }
  .hero-content.is-center { margin-left: auto; margin-right: auto; text-align: center; }
  .hero-eyebrow { color: rgba(255,255,255,.78); font-size: 12px; margin-bottom: 14px; }
  .hero-headline {
    color: #fff; font-size: calc(clamp(28px, 2.6vw, 40px) * var(--hscale));
    line-height: 1.12; letter-spacing: -0.01em; margin: 0 0 14px; text-wrap: pretty;
  }
  .hero-sub { color: rgba(255,255,255,.82); font-size: 15px; max-width: 420px; margin: 0 0 24px; text-wrap: pretty; }
  .hero-content.is-center .hero-sub { margin-left: auto; margin-right: auto; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .hero-content.is-center .hero-ctas { justify-content: center; }
  .hero-dots {
    position: absolute; z-index: 3; right: max(28px, calc((100vw - 1160px) / 2));
    bottom: 28px; display: flex; gap: 8px;
  }
  .hero-dot {
    padding: 8px 16px; border-radius: 999px; cursor: pointer;
    border: 1px solid rgba(255,255,255,.35); background: rgba(10,14,11,.45);
    color: rgba(255,255,255,.75); font: 600 12.5px "Work Sans", sans-serif;
    letter-spacing: .04em; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .hero-dot:hover { color: #fff; border-color: rgba(255,255,255,.7); }
  .hero-dot.is-active { background: rgba(255,255,255,.92); color: #1E2226; border-color: transparent; }

  /* ---- Portfolio ---- */
  .tabs { display: flex; gap: 8px; margin: 0 0 28px; }
  .tab {
    padding: 11px 24px; border-radius: 4px; border: 1px solid var(--line);
    background: transparent; color: var(--muted);
    font: 600 14px "Work Sans", sans-serif; cursor: pointer;
    transition: color .15s ease, background .15s ease, border-color .15s ease;
  }
  .tab:hover { color: var(--ink); border-color: var(--muted); }
  .tab.is-active { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

  .gallery { display: grid; grid-auto-rows: 230px; grid-auto-flow: dense; }
  @media (prefers-reduced-motion: no-preference) {
    .gallery { animation: galleryIn .35s ease both; }
  }
  @keyframes galleryIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tile { width: 100%; height: 100%; }
  .tile-portrait-wrap { width: 100%; aspect-ratio: 2 / 3; position: relative; }
  .tile-portrait-inner { position: absolute; inset: 0; width: 100%; height: 100%; }
  .tile-landscape-wrap { width: 100%; aspect-ratio: 3 / 2; position: relative; }
  .tile-landscape-inner { position: absolute; inset: 0; width: 100%; height: 100%; }
  .tile-featured { grid-column: span 2; grid-row: span 2; }

  /* ---- Services ---- */
  .services-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 56px 80px; margin-top: 56px;
  }
  .service-num {
    font-family: "Newsreader", serif; font-size: 44px; color: var(--accent);
    line-height: 1; margin-bottom: 18px;
  }
  .service-title { font-size: 27px; margin-bottom: 6px; }
  .service-kicker {
    font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 14px;
  }
  .service-body { color: var(--muted); margin: 0; text-wrap: pretty; }

  /* ---- About ---- */
  .about-grid { display: grid; grid-template-columns: 380px 1fr; gap: 72px; align-items: start; }
  .about-slot { width: 100%; height: 460px; }
  .about-facts { display: flex; flex-direction: column; gap: 0; margin: 22px 0 0; }
  .fact {
    display: flex; justify-content: space-between; gap: 16px;
    padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .fact dt { color: var(--muted); margin: 0; }
  .fact dd { margin: 0; font-weight: 500; text-align: right; }
  .about-para { color: var(--muted); max-width: 600px; margin: 0 0 18px; text-wrap: pretty; }
  .about-para:first-of-type { color: var(--ink); font-size: 18px; }

  /* ---- Process ---- */
  .process-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; margin-top: 48px; }
  .step { border-top: 2px solid var(--accent); padding-top: 24px; }
  .step-num {
    font-family: "Newsreader", serif; font-size: 19px; color: var(--accent);
    margin-bottom: 12px;
  }
  .step-title { font-size: 24px; margin-bottom: 10px; }
  .step-body { color: var(--muted); margin: 0; text-wrap: pretty; }

  /* ---- Contact ---- */
  .contact { background: #1F2A46; color: #E8EAF0; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 80px; align-items: start; }
  .contact-eyebrow { color: #D6A83E; }
  .contact-heading { color: #FFFFFF; }
  .contact-sub { color: rgba(232,234,240,.78); max-width: 460px; margin: 0 0 36px; text-wrap: pretty; }
  .contact-help { border: 1px solid rgba(232,234,240,.18); border-radius: 4px; padding: 22px 24px; max-width: 420px; }
  .help-title { font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin: 0 0 12px; color: rgba(239,238,233,.65); }
  .help-list { margin: 0; padding: 0 0 0 18px; color: rgba(239,238,233,.85); font-size: 15px; display: flex; flex-direction: column; gap: 6px; }
  .contact-email { margin: 28px 0 0; color: rgba(232,234,240,.7); font-size: 15px; }
  .contact-email a { color: #FFFFFF; font-weight: 500; }

  .contact-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field-full { grid-column: 1 / -1; }
  .field label {
    font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(239,238,233,.65);
  }
  .field input, .field select, .field textarea {
    background: rgba(255,255,255,.06); border: 1px solid rgba(239,238,233,.22);
    border-radius: 4px; padding: 13px 14px; color: #FFFFFF;
    font: 400 15px "Work Sans", sans-serif; width: 100%; resize: vertical;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input::placeholder, .field textarea::placeholder { color: rgba(239,238,233,.4); }
  .field select { appearance: none; }
  .field select option { color: #1E2226; background: #FCFBF9; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--accent); background: rgba(255,255,255,.1);
  }
  .field.has-error input, .field.has-error textarea { border-color: #D98064; }
  .field-error { margin: 0; font-size: 13px; color: #E8A48E; }
  .btn-submit { width: 100%; }

  .contact-success {
    border: 1px solid rgba(239,238,233,.2); border-radius: 4px;
    padding: 56px 48px; text-align: center; align-self: stretch;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  }
  .success-title { font-size: 34px; color: #fff; }
  .success-body { color: rgba(239,238,233,.78); max-width: 380px; margin: 0 0 10px; }

  /* ---- Footer ---- */
  .footer { border-top: 1px solid var(--line); padding: 36px 0; }
  .footer-inner { display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap; }
  .footer-brand { font-size: 21px; margin-right: 2px; }
  .footer-inner > div { display: flex; align-items: baseline; gap: 8px; margin-right: auto; }
  .footer-line { margin: 0; font-size: 14px; color: var(--muted); }
  .footer-fine { margin: 0; font-size: 12.5px; color: var(--muted); opacity: .7; width: 100%; }

  /* ---- Responsive ---- */
  @media (max-width: 920px) {
    .nav-links { display: none; }
    .services-grid, .process-grid { grid-template-columns: 1fr; gap: 40px; }
    .about-grid { grid-template-columns: 1fr; gap: 48px; }
    .contact-grid { grid-template-columns: 1fr; gap: 56px; }
    .tile-featured { grid-column: span 1; grid-row: span 1; }
    .hero-content { margin-left: 0; padding: 120px 28px 90px; }
  }
  @media (max-width: 500px) {
    .brand-tag { display: none; }
    .hero-headline { font-size: 22px !important; line-height: 1.18; }
    .hero-sub { font-size: 13px !important; }
    .hero-content { padding: 80px 22px 72px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
/* ── Image-slot IndexedDB persistence ── */
/* Dropped images are saved to IndexedDB so they survive page refreshes.
   The src= attributes on image-slot elements provide the default images
   that all visitors see; IndexedDB overrides are session-local to the
   browser that did the drop. */
(function () {
  var DB_NAME  = 'bob-photo-slots';
  var STORE    = 'slots';

  var _dbPromise = null;
  function openDb() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function (e) { e.target.result.createObjectStore(STORE); };
      req.onsuccess  = function (e) { resolve(e.target.result); };
      req.onerror    = function ()  { reject(); };
    }).catch(function () { return null; });
    return _dbPromise;
  }

  function idbGetAll() {
    return openDb().then(function (db) {
      if (!db) return {};
      return new Promise(function (resolve) {
        var tx    = db.transaction(STORE, 'readonly');
        var store = tx.objectStore(STORE);
        var out   = {};
        var keysReq = store.getAllKeys();
        keysReq.onsuccess = function () {
          var keys    = keysReq.result;
          var pending = keys.length;
          if (!pending) { resolve(out); return; }
          keys.forEach(function (k) {
            var r = store.get(k);
            r.onsuccess = function () { out[k] = r.result; if (!--pending) resolve(out); };
            r.onerror   = function () { if (!--pending) resolve(out); };
          });
        };
        keysReq.onerror = function () { resolve(out); };
      });
    }).catch(function () { return {}; });
  }

  function idbSetAll(data) {
    if (!data || !Object.keys(data).length) return;
    openDb().then(function (db) {
      if (!db) return;
      var tx    = db.transaction(STORE, 'readwrite');
      var store = tx.objectStore(STORE);
      Object.keys(data).forEach(function (k) { store.put(data[k], k); });
    }).catch(function () {});
  }

  /* Intercept the sidecar fetch so image-slot.js can merge IDB data on load */
  var _fetch = window.fetch;
  window.fetch = function (url) {
    if (String(url).indexOf('.image-slots.state.json') !== -1) {
      return idbGetAll().then(function (idb) {
        return { ok: true, json: function () { return Promise.resolve(idb || {}); } };
      });
    }
    return _fetch.apply(this, arguments);
  };

  /* Mirror every drop into IDB via the omelette.writeFile intercept */
  function patchOmelette() {
    if (window.omelette && window.omelette.writeFile && !window.omelette.__idbPatch) {
      var _orig = window.omelette.writeFile.bind(window.omelette);
      window.omelette.writeFile = function (path, data) {
        if (String(path).indexOf('.image-slots.state.json') !== -1) {
          try { idbSetAll(JSON.parse(data)); } catch (e) {}
        }
        return _orig(path, data);
      };
      window.omelette.__idbPatch = true;
    }
  }
  patchOmelette();
  window.addEventListener('load', patchOmelette);

  /* Also write to IDB on every setSlot call by patching fetch responses */
  var _origFetch = window.fetch;
  window._idbSetAll = idbSetAll;
})();
</script>
<script src="image-slot.js"></script>
<script src="site-copy.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site-components.jsx"></script>
<script type="text/babel" src="site-app.jsx"></script>

<!-- Tweaks panel: open with Ctrl+Shift+E in your browser -->
<script>
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'E') {
    window.postMessage({ type: '__activate_edit_mode' }, '*');
  }
});
</script>
</body>
